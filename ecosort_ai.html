<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>EcoSort-AI | Centro de Control Industrial</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --p: #10b981;
            --bg: #020617;
            --card: #0f172a;
            --accent: #34d399;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 30px;
        }

        .hero {
            text-align: center;
            padding: 40px;
            background: linear-gradient(rgba(16, 185, 129, 0.1), transparent);
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--accent);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Simulación de Cinta Transportadora */
        .conveyor-belt {
            background: #111827;
            border-radius: 24px;
            height: 500px;
            position: relative;
            overflow: hidden;
            border: 4px solid #1e293b;
            box-shadow: inset 0 0 50px #000;
        }

        .roller {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.5s linear;
            top: -100px;
        }

        .scanner-line {
            position: absolute;
            top: 150px;
            width: 100%;
            height: 5px;
            background: var(--p);
            box-shadow: 0 0 20px var(--p);
            z-index: 10;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }

        .sorter-stats {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
        }

        .val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--p);
        }

        .log {
            background: #000;
            flex: 1;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #64748b;
            overflow-y: auto;
            height: 200px;
        }

        .btn-start {
            background: var(--p);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="hero">
        <p style="text-transform: uppercase; letter-spacing: 5px; color: var(--p); margin-bottom: 5px;">Smart Logistics
            v4.0</p>
        <h1>EcoSort-AI Industrial</h1>
        <p style="opacity: 0.7;">Clasificación Multimodal de Residuos mediante Visión Artificial Computacional</p>
    </div>

    <div class="main-grid">
        <div class="conveyor-belt" id="belt">
            <div class="scanner-line"></div>
            <div id="items-container"></div>
            <div
                style="position: absolute; bottom: 20px; width: 100%; text-align: center; color: #334155; font-size: 0.75rem;">
                SIMULACIÓN DE CINTA DE TRIAJE - IZAN URIOS 3R</div>
        </div>

        <div class="sorter-stats">
            <h2>Supervisión de Planta</h2>
            <div class="stat-row"><span>♻️ PLÁSTICOS (PET)</span><span class="val" id="st-p">0</span></div>
            <div class="stat-row"><span>🔩 METALES (FE)</span><span class="val" id="st-m">0</span></div>
            <div class="stat-row"><span>📦 CARTÓN/PAPEL</span><span class="val" id="st-c">0</span></div>

            <button class="btn-start" id="btn" onclick="toggleSystem()">ACTIVAR LÍNEA DE PRODUCCIÓN</button>
            <div class="log" id="log">... Esperando activación ...</div>
        </div>
    </div>

    <script>
        let running = false;
        let counters = { p: 0, m: 0, c: 0 };
        const types = [
            { icon: '🥤', label: 'BOTELLA PLÁSTICO', cat: 'p', color: '#10b981' },
            { icon: '🥫', label: 'LATA ALUMINIO', cat: 'm', color: '#f59e0b' },
            { icon: '📦', label: 'CAJA CARTÓN', cat: 'c', color: '#3b82f6' },
            { icon: '🔩', label: 'PIEZA MECÁNICA', cat: 'm', color: '#f59e0b' }
        ];

        function toggleSystem() {
            running = !running;
            const btn = document.getElementById('btn');
            btn.innerText = running ? 'DETENER LÍNEA' : 'ACTIVAR LÍNEA';
            btn.style.background = running ? '#ef4444' : '#10b981';
            if (running) {
                addLog("SISTEMA: Iniciando motores de la cinta...");
                spawnLoop();
            }
        }

        function spawnLoop() {
            if (!running) return;
            spawnItem();
            setTimeout(spawnLoop, 3000);
        }

        function spawnItem() {
            const container = document.getElementById('items-container');
            const type = types[Math.floor(Math.random() * types.length)];
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = type.icon;
            item.style.left = 'calc(50% - 40px)';
            item.style.border = `3px solid ${type.color}`;
            container.appendChild(item);

            let pos = -100;
            const anim = setInterval(() => {
                if (!running) { clearInterval(anim); item.remove(); return; }
                pos += 5;
                item.style.top = pos + 'px';

                // Detección en la línea del scanner
                if (pos > 140 && pos < 155 && !item.scanned) {
                    item.scanned = true;
                    item.style.boxShadow = `0 0 30px ${type.color}`;
                    processItem(type);
                }

                if (pos > 500) {
                    clearInterval(anim);
                    item.remove();
                }
            }, 20);
        }

        function processItem(type) {
            counters[type.cat]++;
            document.getElementById(`st-${type.cat}`).innerText = counters[type.cat];
            addLog(`IA DETECT : [${type.label}] -> Derivado a tolva de ${type.cat === 'p' ? 'Plásticos' : type.cat === 'm' ? 'Metales' : 'Cartón'}`);
        }

        function addLog(msg) {
            const l = document.getElementById('log');
            l.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + l.innerHTML;
        }
    </script>
</body>

</html>
